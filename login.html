/* MAIN */
.auth-wrap{position:relative;z-index:1;flex:1;display:flex;align-items:center;justify-content:center;padding:40px 16px;}
.auth-box{width:100%;max-width:440px;}
/* Logo top */
.auth-logo{text-align:center;margin-bottom:32px;}
.auth-logo img{width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);box-shadow:0 0 24px rgba(201,168,76,0.3);margin-bottom:12px;}
.auth-logo h1{font-family:'Cinzel',serif;font-size:20px;letter-spacing:4px;color:var(--gold);}
.auth-logo p{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-top:4px;}
/* Card */
.auth-card{background:var(--navy-card);border:1px solid var(--border);border-radius:10px;overflow:hidden;position:relative;}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold-dark),var(--gold),var(--gold-dark));}
/* Tabs */
.auth-tabs{display:flex;border-bottom:1px solid var(--border);}
.tab-btn{flex:1;padding:16px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;background:none;border:none;color:var(--muted);cursor:pointer;transition:all 0.25s;border-bottom:2px solid transparent;margin-bottom:-1px;}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(201,168,76,0.04);}
/* Form */
.tab-content{display:none;padding:32px 32px 28px;}
.tab-content.active{display:block;}
.form-group{margin-bottom:18px;}
.form-group label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:700;display:block;margin-bottom:7px;}
.input-wrap{position:relative;}
.input-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;}
.form-group input{width:100%;background:rgba(13,27,42,0.8);border:1px solid var(--border);border-radius:4px;color:var(--cream);font-family:'Montserrat',sans-serif;font-size:13px;padding:12px 14px 12px 40px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
.form-group input::placeholder{color:var(--muted);opacity:0.5;}
.form-group input:focus{border-color:rgba(201,168,76,0.6);box-shadow:0 0 0 3px rgba(201,168,76,0.08);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
/* Error */
.err-msg{display:none;background:rgba(229,83,83,0.1);border:1px solid rgba(229,83,83,0.3);border-radius:4px;padding:10px 14px;font-size:12px;color:var(--red);margin-bottom:16px;}
.err-msg.show{display:flex;align-items:center;gap:8px;}
/* Btn */
.auth-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--gold-dark),var(--gold),var(--gold-dark));color:var(--navy);border:none;border-radius:4px;font-family:'Cinzel',serif;font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all 0.3s;margin-top:4px;}
.auth-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,0.35);}
.auth-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
/* Footer note */
.auth-note{text-align:center;font-size:10px;color:var(--muted);margin-top:20px;letter-spacing:0.5px;}
footer{position:relative;z-index:1;background:var(--navy-mid);border-top:1px solid var(--border);text-align:center;padding:18px;font-size:11px;letter-spacing:2px;color:var(--muted);}
footer span{color:var(--gold);}
</style>
</head>

<script>
const supa = supabase.createClient('https://uvpxntrslfnvyzcwpkll.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2cHhudHJzbGZudnl6Y3dwa2xsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NTQ1MjAsImV4cCI6MjA4ODUzMDUyMH0.JrILmVVMjWTjLhMCXOll4I02BolViAyNs2L2DpfegXc');

// If already logged in, redirect
window.addEventListener('DOMContentLoaded', () => {
  const u = JSON.parse(localStorage.getItem('loggedInUser') || 'null');
  if (u) redirect(u.role);
});

function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&t==='login')||(i===1&&t==='register')));
  document.getElementById('tab-login').classList.toggle('active', t==='login');
  document.getElementById('tab-register').classList.toggle('active', t==='register');
  hideErr('loginErr'); hideErr('regErr');
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.classList.add('show');
  document.getElementById(id+'Text').textContent = msg;
}
function hideErr(id) { document.getElementById(id).classList.remove('show'); }

async function doLogin() {
  hideErr('loginErr');
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  if (!email || !pass) { showErr('loginErr','Please fill in all fields.'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Logging in…';

  const {data, error} = await supa
    .from('users')
    .select('*')
    .eq('email', email)
    .eq('password', pass)
    .single();

  btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-right-to-bracket" style="margin-right:8px;"></i>Login';

  if (error || !data) { showErr('loginErr','Invalid email or password.'); return; }

  localStorage.setItem('loggedInUser', JSON.stringify({id:data.id, name:data.name, email:data.email, role:data.role, phone:data.phone||''}));
  redirect(data.role);
}

async function doRegister() {
  hideErr('regErr');
  const name  = document.getElementById('regName').value.trim();
  const phone = document.getElementById('regPhone').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass  = document.getElementById('regPass').value;
  const pass2 = document.getElementById('regPass2').value;

  if (!name||!email||!pass) { showErr('regErr','Name, email and password are required.'); return; }
  if (pass.length < 6)       { showErr('regErr','Password must be at least 6 characters.'); return; }
  if (pass !== pass2)        { showErr('regErr','Passwords do not match.'); return; }

  const btn = document.getElementById('regBtn');
  btn.disabled = true; btn.textContent = 'Creating account…';

  // Check duplicate email
  const {data:existing} = await supa.from('users').select('id').eq('email',email).single();
  if (existing) { showErr('regErr','An account with this email already exists.'); btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-user-plus" style="margin-right:8px;"></i>Create Account'; return; }

  const {data, error} = await supa
    .from('users')
    .insert({name, email, phone, password:pass, role:'customer'})
    .select()
    .single();

  btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-user-plus" style="margin-right:8px;"></i>Create Account';

  if (error) { showErr('regErr','Registration failed. Please try again.'); return; }

  localStorage.setItem('loggedInUser', JSON.stringify({id:data.id, name:data.name, email:data.email, role:'customer', phone:data.phone||''}));
  redirect('customer');
}

function redirect(role) {
  window.location.href = role === 'admin' ? 'admin-dashboard.html' : 'customer-dashboard.html';
}
</script>
